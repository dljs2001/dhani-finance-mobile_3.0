<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transaction Receipt Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        <div class="mobile-view">
            <canvas id="receiptCanvas"></canvas>
        </div>

        <div class="form-container">
            <h3>Edit Details</h3>
            <form id="detailsForm">
                <label for="formTopLeftTime">Top Left Time:</label>
                <input type="time" id="formTopLeftTime">

                <!-- New Field for Transaction Status -->
                <label for="formStatusText">Status Text:</label>
                <input type="text" id="formStatusText" value="Transaction is In Process">

                <label for="formTransactionTime">Transaction Time:</label>
                <input type="time" id="formTransactionTime">

                <label for="formDate">Date:</label>
                <input type="date" id="formDate">

                <label for="formName">Name:</label>
                <input type="text" id="formName" value="Jeevan Jogi">

                <label for="formUpiId">UPI ID / Mobile Number:</label>
                <input type="text" id="formUpiId" value="9483800687">

                <label for="formAmount">Amount:</label>
                <input type="number" id="formAmount" value="6500">
            </form>
            <button id="downloadBtn">Download as PNG</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
